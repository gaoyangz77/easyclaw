version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: dlxai_credits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dlxai2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./cloud-api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  cloud-api:
    image: node:20-alpine
    restart: always
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cloud-api:/app
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-dlxai2026}@postgres:5432/dlxai_credits
      OPENROUTER_MASTER_KEY: ${OPENROUTER_KEY:-}
      ADMIN_KEY: ${ADMIN_KEY:-change-me}
      FREE_CREDITS: ${FREE_CREDITS:-100}
      DAILY_FREE_TOKENS: ${DAILY_FREE_TOKENS:-100000}
      PORT: "3100"
      NODE_ENV: production
    command: sh -c "npm install --omit=dev && node dist/index.js"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - cloud-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  certs:

version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: dlxai_credits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dlxai2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./cloud-api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  cloud-api:
    image: node:20-alpine
    restart: always
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cloud-api:/app
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-dlxai2026}@postgres:5432/dlxai_credits
      OPENROUTER_MASTER_KEY: ${OPENROUTER_KEY:-}
      ADMIN_KEY: ${ADMIN_KEY:-change-me}
      FREE_CREDITS: ${FREE_CREDITS:-100}
      DAILY_FREE_TOKENS: ${DAILY_FREE_TOKENS:-100000}
      PORT: "3100"
      NODE_ENV: production
    command: sh -c "npm install --omit=dev && node dist/index.js"
    ports:
      - "127.0.0.1:3100:3100"

volumes:
  pgdata:
